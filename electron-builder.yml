appId: church.crossings.rockunmerge
productName: Rock Unmerge Tool
copyright: Copyright (c) 2026 Crossings Church

# Tell electron-builder where to find icons + bundle resources.
directories:
  buildResources: build
  output: dist

# Stable download filenames -- no version stamp so the README's direct
# download links keep working across releases. The version is still
# discoverable in the GitHub release page and inside the app itself.
artifactName: "${productName}-${os}-${arch}.${ext}"

# Files actually shipped inside the asar bundle. Native deps are unpacked so
# they can dlopen at runtime.
files:
  - "out/**/*"
  - "package.json"
asarUnpack:
  - "**/*.{node,dll}"

# Don't try to publish to GitHub releases on local builds. Override in CI by
# setting GH_TOKEN and removing this line.
publish: null

# ---- Windows ------------------------------------------------------------
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Rock Unmerge Tool
  uninstallDisplayName: "${productName} ${version}"

# ---- macOS --------------------------------------------------------------
mac:
  icon: build/icon.png
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  # Notarization is auto-detected by electron-builder: when a Developer ID
  # Application cert is in the keychain AND APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID env vars are set, notarytool runs automatically. With nothing
  # configured the build still completes (just unsigned). See docs/CODESIGNING.md.
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ---- Linux --------------------------------------------------------------
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Office
